# SwiftAnvil Canonical SwiftLint Configuration
# Version: 1.0.0
# Source: swiftanvil-enforcement/configs/swiftlint.yml
#
# Install locally:
#   brew install swiftlint
# Lint:
#   swiftlint lint --strict
# Auto-fix:
#   swiftlint --fix

# Run against all Swift files by default
included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - docs
  - "*.generated.swift"

# Base rules — disabled to avoid conflict with SwiftFormat or for phased adoption
disabled_rules:
  # SwiftFormat handles these; disable to avoid conflicts
  - trailing_comma
  - trailing_newline
  - vertical_whitespace
  - opening_brace
  - closure_end_indentation
  # Disabled for Phase 11.1 initial adoption; enable in remediation sprint
  - sorted_imports
  - force_unwrapping
  - number_separator
  - trailing_closure
  - for_where
  - prefer_self_in_static_references
  - unneeded_synthesized_initializer
  - explicit_self
  - redundant_self_in_closure
  # Allow documented file-level opt-outs for legacy debt
  - blanket_disable_command

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_assert
  - discouraged_none_name
  - duplicate_imports
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - file_name_no_space
  - first_where
  - function_default_parameter_at_end
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - missing_docs
  - modifier_order
  - nslocalizedstring_require_bundle
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - self_binding
  - shorthand_optional_binding
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unavailable_function
  - unhandled_throwing_task
  - unneeded_parentheses_in_closure_argument
  - unused_capture_list
  - vertical_parameter_alignment_on_call
  - void_function_in_ternary
  - weak_delegate
  - xct_specific_matcher

# Rule configurations
line_length:
  warning: 120
  error: 140
  ignores_urls: true
  ignores_function_declarations: false
  ignores_comments: true
  ignores_interpolated_strings: true

file_length:
  warning: 350
  error: 500

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 12
  error: 20

nesting:
  type_level:
    warning: 2
  statement_level:
    warning: 5

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - k

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

missing_docs:
  warning:
    - public

modifier_order:
  preferred_order:
    - open
    - public
    - internal
    - fileprivate
    - private
    - static
    - class
    - final
    - override
    - required
    - convenience
    - mutating
    - nonmutating
    - lazy
    - weak
    - unowned

# SwiftAnvil custom rules
custom_rules:
  raw_accessibility_identifier:
    name: "Raw Accessibility Identifier"
    regex: '\.accessibilityIdentifier\s*\('
    message: "Use .a11yID() with typed A11yID instead of raw accessibilityIdentifier()"
    severity: error

  hardcoded_display_string:
    name: "Hardcoded Display String"
    regex: '(Text|Button|NavigationLink|navigationTitle|navigationBarTitle)\s*\("[^"]+"\)'
    message: "Use AppStrings for user-facing text"
    severity: warning

  undocumented_public_declaration:
    name: "Undocumented Public"
    regex: '^\s*public\s+(?:func|var|let|class|struct|enum|protocol|actor|typealias)\s+\w+'
    message: "Public declarations must have DocC documentation (///)"
    severity: warning
    match_kinds:
      - identifier

  platform_policy_old_version:
    name: "Old Platform Version"
    regex: '\.(v13|v14|v16|v17)\b'
    message: "Platform versions below SwiftAnvil policy minimum. Use iOS 18+, macOS 15+, tvOS 18+, watchOS 11+, visionOS 2+."
    severity: error

  notification_center_add_observer:
    name: "Legacy NotificationCenter"
    regex: 'NotificationCenter\.default\.addObserver'
    message: "Use async notifications sequence instead of addObserver"
    severity: warning

  dispatch_queue_main_async:
    name: "Legacy DispatchQueue.main"
    regex: 'DispatchQueue\.main\.async'
    message: "Use MainActor instead of DispatchQueue.main.async"
    severity: warning

  url_session_data_task:
    name: "Legacy URLSession"
    regex: 'URLSession\.shared\.dataTask'
    message: "Use async URLSession methods"
    severity: warning

  available_check:
    name: "Availability Check"
    regex: '(#available|@available)'
    message: "SwiftAnvil platform policy does not use availability checks. Target minimum platform only."
    severity: error

reporter: "xcode"
