name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Docs Command Validation
        run: |
          # Verify docs subcommands are registered
          .build/debug/SwiftAnvilCLI docs --help | grep -q "generate"
          .build/debug/SwiftAnvilCLI docs --help | grep -q "preview"
          .build/debug/SwiftAnvilCLI docs --help | grep -q "compose"
          .build/debug/SwiftAnvilCLI docs --help | grep -q "validate"

  release-dry-run:
    runs-on: macos-15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build release binary
        run: swift build -c release
      - name: Verify binary exists
        run: test -f .build/release/SwiftAnvilCLI
