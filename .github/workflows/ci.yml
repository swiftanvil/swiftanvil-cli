name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Docs Command Validation
        run: |
          # Verify docs subcommands are registered
          .build/debug/SwiftAnvilCLI docs --help | grep -q "generate"
          .build/debug/SwiftAnvilCLI docs --help | grep -q "preview"
          .build/debug/SwiftAnvilCLI docs --help | grep -q "compose"
          .build/debug/SwiftAnvilCLI docs --help | grep -q "validate"

  lint:
    needs: build-and-test
    uses: swiftanvil/swiftanvil-enforcement/.github/workflows/swift-lint.yml@v1
    with:
      swiftanvil-version: 'latest'
      lint-package: true
      lint-source: true
      lint-tests: true
      lint-dependencies: true
      fail-on-warning: false

  release-dry-run:
    runs-on: macos-15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Build release binary
        run: swift build -c release
      - name: Verify binary exists
        run: test -f .build/release/SwiftAnvilCLI
